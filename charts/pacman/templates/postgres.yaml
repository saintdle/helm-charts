{{- if eq .Values.database "postgres" }}
{{- if .Values.postgres.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pacman.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pacman.postgres.labels" $ | nindent 4 }}
spec:
  accessModes:
{{ toYaml .Values.postgres.persistence.accessModes | indent 4 }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size | quote }}
  {{- if .Values.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pacman.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pacman.postgres.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: pg
      name: pg
  selector:
    {{- include "pacman.postgres.selectorLabels" $ | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pacman.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pacman.postgres.labels" $ | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pacman.postgres.selectorLabels" $ | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pacman.postgres.labels" $ | nindent 8 }}
    spec:
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: {{ include "pacman.postgres.secretName" . }}
          env:
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: {{ include "pacman.postgres.secretName" . }}, key: database } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: {{ include "pacman.postgres.secretName" . }}, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "pacman.postgres.secretName" . }}, key: password } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: pg
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 20
            periodSeconds: 15
          resources: {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          {{- if .Values.postgres.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "pacman.postgres.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.postgres.migration.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pacman.postgres.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pacman.migrate.labels" $ | nindent 4 }}
spec:
  backoffLimit: {{ .Values.postgres.migration.backoffLimit }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "pacman.migrate.labels" $ | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop: ["ALL"]
          env:
            - name: POSTGRES_HOST
              value: {{ include "pacman.postgres.fullname" . }}
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: {{ include "pacman.postgres.secretName" . }}, key: database } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: {{ include "pacman.postgres.secretName" . }}, key: username } }
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for postgres..."; sleep 2;
              done
      containers:
        - name: migrate
          image: {{ include "pacman.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["node", "src/db/migrate.js"]
          env:
            - name: DB_TYPE
              value: postgres
            - name: POSTGRES_HOST
              value: {{ include "pacman.postgres.fullname" . }}
            - name: POSTGRES_PORT
              value: "{{ .Values.postgres.service.port }}"
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: {{ include "pacman.postgres.secretName" . }}, key: database } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: {{ include "pacman.postgres.secretName" . }}, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "pacman.postgres.secretName" . }}, key: password } }
{{- end }}
{{- end }}
